<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e67e22">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="عقاري">
  <link rel="apple-touch-icon" href="icons/icon-192.png"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>محادثة - عقاري</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body{padding-bottom:0!important;}
.chat-header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px);}
.chat-header-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;font-size:1rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-header-info{flex:1;overflow:hidden;}
.chat-header-name{font-weight:800;font-size:0.95rem;}
.chat-header-prop{font-size:0.72rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0;height:calc(100vh - 130px);}
.msg-row{display:flex;}
.msg-me{justify-content:flex-start;}
.msg-them{justify-content:flex-end;}
.msg-bubble{max-width:75%;padding:10px 13px;border-radius:16px;font-size:0.88rem;line-height:1.5;position:relative;}
.msg-bubble-me{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:white;border-radius:16px 16px 4px 16px;}
.msg-bubble-them{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 16px 4px;box-shadow:var(--shadow-sm);}
.msg-time{font-size:0.62rem;opacity:0.7;display:block;margin-top:4px;text-align:left;}
.chat-input-bar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:8px;}
.chat-input{flex:1;border:1.5px solid var(--border);border-radius:24px;padding:10px 16px;font-family:var(--font);font-size:0.88rem;background:var(--gray-light);color:var(--text);outline:none;resize:none;max-height:100px;}
.chat-input:focus{border-color:var(--accent);}
.chat-send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-hover));border:none;color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-accent);transition:all 0.2s;}
.chat-send-btn:hover{transform:scale(1.05);}
.typing-indicator{display:flex;gap:4px;padding:12px;align-items:center;}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);animation:typing 1.4s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="chat-header">
  <a href="messages.html" class="header-icon-btn"><i class="fas fa-arrow-right"></i></a>
  <div class="chat-header-avatar" id="chatAvatar">?</div>
  <div class="chat-header-info">
    <div class="chat-header-name" id="chatName">جاري التحميل...</div>
    <div class="chat-header-prop" id="chatPropTitle"></div>
  </div>
  <button class="header-icon-btn" onclick="showToast('قريباً: مكالمة صوتية')"><i class="fas fa-phone"></i></button>
</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input-bar">
  <button class="header-icon-btn" onclick="showToast('قريباً: إرفاق ملف')"><i class="fas fa-paperclip"></i></button>
  <textarea class="chat-input" id="chatInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
  <button class="chat-send-btn" id="chatSendBtn"><i class="fas fa-paper-plane"></i></button>
</div>
<div id="toast"></div>
<script src="js/app.js"></script>
<script src="js/firebase.js"></script>
<!-- app.js handles all chat initialization -->

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js')
      .then(function(reg){console.log('[عقاري] SW مُفعّل');})
      .catch(function(e){console.warn('[عقاري] SW خطأ:',e);});
  });
}
</script>
</body>
</html>
