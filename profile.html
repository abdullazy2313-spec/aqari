<style>
/* ── صورة البروفايل ── */
.pic-outer {
  position: relative;
  width: 96px; height: 96px;
  margin: 0 auto 14px;
}
/* label يغطي الدائرة كاملاً = نقر في أي مكان يفتح المعرض */
.pic-label {
  display: block;
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 3.5px solid var(--accent);
  overflow: hidden;
  background: var(--gray-light);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(230,126,34,0.25);
  position: relative;
}
.pic-label img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 50%;
}
.pic-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.pic-placeholder i { font-size: 2.4rem; color: var(--accent); }
/* أيقونة الكاميرا/القلم */
.pic-badge {
  position: absolute;
  bottom: 2px; left: 2px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: 2.5px solid var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
  box-shadow: 0 2px 10px rgba(230,126,34,0.5);
  pointer-events: none; /* لا يمنع النقر على الـ label */
}

/* ── Modal القص ── */
#CROP {
  position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.97);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px;
}
#CROP.open { display: flex; }

.crop-title {
  color: white; font-size: 0.95rem; font-weight: 800;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.crop-title i { color: var(--accent); }

/* دائرة القص */
#crop-circle {
  position: relative;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--accent);
  background: #111;
  cursor: grab;
  touch-action: none;
  box-shadow: 0 0 0 6px rgba(230,126,34,0.15), 0 12px 48px rgba(0,0,0,0.7);
  flex-shrink: 0;
}
#crop-circle.grabbing { cursor: grabbing; }

/* الصورة داخل الدائرة — left/top/width/height للعرض والحفظ */
#crop-img {
  position: absolute;
  display: block;
  pointer-events: none;
  user-select: none;
  touch-action: none;
}

.crop-hint {
  color: rgba(255,255,255,0.4);
  font-size: 0.72rem;
  margin-top: 10px;
  text-align: center;
  line-height: 1.6;
}
.crop-actions {
  display: flex; gap: 10px;
  margin-top: 16px;
  width: 100%; max-width: 320px;
}
.crop-btn-cancel {
  flex: 1; padding: 13px; border-radius: 13px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
  font-family: var(--font); font-size: 0.88rem; font-weight: 700;
  cursor: pointer;
}
.crop-btn-save {
  flex: 1.6; padding: 13px; border-radius: 13px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: white;
  font-family: var(--font); font-size: 0.88rem; font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(230,126,34,0.4);
}
.crop-btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>

<div id="toast"></div>

<!-- ═══ Modal القص ═══ -->
<div id="CROP">
  <div class="crop-title">
    <i class="fas fa-crop-alt"></i> اضبط الصورة
  </div>
  <div id="crop-circle">
    <img id="crop-img" alt="">
  </div>
  <div class="crop-hint">
    <i class="fas fa-hand-pointer"></i> اسحب لتحريك
    &nbsp;·&nbsp;
    <i class="fas fa-search-plus"></i> إصبعان للتكبير
  </div>
  <div class="crop-actions">
    <button class="crop-btn-cancel" id="crop-cancel">
      <i class="fas fa-times" style="margin-left:6px"></i>إلغاء
    </button>
    <button class="crop-btn-save" id="crop-save">
      <i class="fas fa-check" style="margin-left:6px"></i>حفظ الصورة
    </button>
  </div>

<script src="js/app.js"></script>
<script>
(function() {
'use strict';

/* ═══════════════════════════════════════════════════════
   متغيرات القص
   الصورة في الدائرة (SZ × SZ):
     left = X, top = Y, width = NW*S, height = NH*S
   الحفظ في Canvas (OUT × OUT):
     ratio = OUT/SZ
     drawImage(img, X*ratio, Y*ratio, NW*S*ratio, NH*S*ratio)
═══════════════════════════════════════════════════════ */

var SZ    = 280;   /* حجم دائرة القص */
var OUT   = 400;   /* حجم الصورة المحفوظة */
var X     = 0;     /* left */
var Y     = 0;     /* top  */
var S     = 1;     /* scale */
var S_MIN = 1;
var S_MAX = 8;
var NW    = 0;     /* عرض الصورة الأصلية */
var NH    = 0;     /* ارتفاع الصورة الأصلية */
var SRC   = '';    /* مصدر الصورة */

/* ── تطبيق الإحداثيات ── */
function draw() {
  var dw = NW * S;
  var dh = NH * S;
  /* قيود */
  if (X > 0) X = 0;
  if (Y > 0) Y = 0;
  if (X < SZ - dw) X = SZ - dw;
  if (Y < SZ - dh) Y = SZ - dh;

  var img = document.getElementById('crop-img');
  if (!img) return;
  img.style.left   = X + 'px';
  img.style.top    = Y + 'px';
  img.style.width  = dw + 'px';
  img.style.height = dh + 'px';
}

/* ── تغيير التكبير من نقطة ── */
function doZoom(newS, cx, cy) {
  newS = Math.min(S_MAX, Math.max(S_MIN, newS));
  var r = newS / S;
  X = cx - (cx - X) * r;
  Y = cy - (cy - Y) * r;
  S = newS;
  draw();
}

/* ── فتح المقص بمصدر صورة ── */
function openCrop(src) {
  SRC = src;
  var loader = new Image();
  loader.onload = function() {
    NW = loader.naturalWidth;
    NH = loader.naturalHeight;

    SZ = Math.min(300, window.innerWidth - 64);
    var circle = document.getElementById('crop-circle');
    circle.style.width  = SZ + 'px';
    circle.style.height = SZ + 'px';

    S_MIN = Math.max(SZ / NW, SZ / NH) * 1.001;
    S_MAX = S_MIN * 8;
    S     = S_MIN;
    X     = (SZ - NW * S) / 2;
    Y     = (SZ - NH * S) / 2;

    var img = document.getElementById('crop-img');
    img.style.left = img.style.top = img.style.width = img.style.height = '';
    img.onload = function() { draw(); };
    img.src = src;
    if (img.complete && img.naturalWidth > 0) draw();

    document.getElementById('CROP').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  loader.onerror = function() {
    if (typeof showToast === 'function') showToast('تعذر فتح الصورة');
  };
  loader.src = src;
}

/* ── إغلاق ── */
function closeCrop() {
  document.getElementById('CROP').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── حفظ الصورة ── */
function saveCrop() {
  var btn = document.getElementById('crop-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:6px"></i>جاري...';

  var img = document.getElementById('crop-img');
  var ratio = OUT / SZ;

  function render(srcImg) {
    var canvas = document.createElement('canvas');
    canvas.width = canvas.height = OUT;
    var ctx = canvas.getContext('2d');

    /* قص دائري */
    ctx.save();
    ctx.beginPath();
    ctx.arc(OUT / 2, OUT / 2, OUT / 2, 0, Math.PI * 2);
    ctx.clip();

    /* رسم الصورة بنفس إحداثيات العرض × ratio */
    ctx.drawImage(
      srcImg,
      X * ratio,
      Y * ratio,
      NW * S * ratio,
      NH * S * ratio
    );
    ctx.restore();

    var url = canvas.toDataURL('image/jpeg', 0.92);
    localStorage.setItem('userPhoto', url);
    renderRing();
    closeCrop();
    if (typeof showToast === 'function') showToast('تم حفظ الصورة بنجاح');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-check" style="margin-left:6px"></i>حفظ الصورة';
  }

  /* إذا الصورة محملة استخدمها مباشرة */
  if (img.complete && img.naturalWidth > 0) {
    render(img);
  } else {
    /* وإلا حملها من جديد */
    var tmp = new Image();
    tmp.onload  = function() { render(tmp); };
    tmp.onerror = function() {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check" style="margin-left:6px"></i>حفظ الصورة';
      if (typeof showToast === 'function') showToast('خطأ في الحفظ');
    };
    tmp.src = SRC;
  }
}

/* ── عرض الصورة في دائرة البروفايل ── */
function renderRing() {
  var placeholder = document.getElementById('pic-placeholder');
  var badgeIcon   = document.getElementById('pic-badge-icon');
  var photo       = localStorage.getItem('userPhoto');

  if (placeholder) {
    if (photo) {
      placeholder.innerHTML =
        '<img src="' + photo + '" '
        + 'onerror="this.parentElement.innerHTML='<i class=\'fas fa-user\' style=\'font-size:2.4rem;color:var(--accent)\'></i>'">';
    } else {
      placeholder.innerHTML = '<i class="fas fa-user" style="font-size:2.4rem;color:var(--accent)"></i>';
    }
  }

  if (badgeIcon) {
    badgeIcon.className = photo ? 'fas fa-pen' : 'fas fa-camera';
  }

  /* إذا الصورة موجودة — القلم يفتح المقص للتعديل بدل المعرض */
  var badge = document.getElementById('pic-badge');
  var label = document.getElementById('pic-label');
  var input = document.getElementById('pic-file-input');

  if (photo) {
    /* ألغِ ربط label بالـ input */
    if (badge) badge.removeAttribute('for');
    if (label) label.removeAttribute('for');

    /* القلم: أعد تعديل الصورة */
    if (badge && !badge._editBound) {
      badge._editBound = true;
      badge.addEventListener('click', function(e) {
        e.preventDefault();
        openCrop(localStorage.getItem('userPhoto'));
      });
    }

    /* دائرة الصورة: فتح معرض لاستبدال */
    if (label && !label._clickBound) {
      label._clickBound = true;
      label.addEventListener('click', function(e) {
        e.preventDefault();
        input.click();
      });
    }
  } else {
    /* بدون صورة: label + for يفتح المعرض مباشرة */
    if (badge) badge.setAttribute('for', 'pic-file-input');
    if (label) label.setAttribute('for', 'pic-file-input');
  }
}

/* ═══ أحداث السحب ═══ */
var drag = false, sx = 0, sy = 0, ox = 0, oy = 0, pd = 0;

document.addEventListener('mousedown', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c || !c.contains(e.target)) return;
  drag = true; sx = e.clientX; sy = e.clientY; ox = X; oy = Y;
  c.classList.add('grabbing');
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!drag) return;
  X = ox + (e.clientX - sx);
  Y = oy + (e.clientY - sy);
  draw();
});
document.addEventListener('mouseup', function() {
  drag = false;
  var c = document.getElementById('crop-circle');
  if (c) c.classList.remove('grabbing');
});

document.addEventListener('touchstart', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c || !c.contains(e.target)) return;
  if (e.touches.length === 1) {
    drag = true; pd = 0;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    ox = X; oy = Y;
    c.classList.add('grabbing');
  } else if (e.touches.length === 2) {
    drag = false;
    c.classList.remove('grabbing');
    pd = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchmove', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c) return;
  if (e.touches.length === 1 && drag) {
    X = ox + (e.touches[0].clientX - sx);
    Y = oy + (e.touches[0].clientY - sy);
    draw();
  } else if (e.touches.length === 2 && pd > 0) {
    var d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    var rect = c.getBoundingClientRect();
    var cx = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
    var cy = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
    doZoom(S * (d / pd), cx, cy);
    pd = d;
  }
  if (c.contains(e.target) || drag) e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', function() {
  drag = false; pd = 0;
  var c = document.getElementById('crop-circle');
  if (c) c.classList.remove('grabbing');
});

/* ═══ تهيئة عند تحميل الصفحة ═══ */
document.addEventListener('DOMContentLoaded', function() {

  /* 1. قراءة الملف المختار */
  var input = document.getElementById('pic-file-input');
  input.addEventListener('change', function() {
    var file = this.files && this.files[0];
    this.value = ''; /* مسح للسماح بإعادة الاختيار */
    if (!file || !file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      openCrop(ev.target.result);
    };
    reader.readAsDataURL(file);
  });

  /* 2. إغلاق المقص */
  document.getElementById('crop-cancel').addEventListener('click', closeCrop);
  document.getElementById('crop-save').addEventListener('click', saveCrop);
  document.getElementById('CROP').addEventListener('click', function(e) {
    if (e.target === this) closeCrop();
  });

  /* 3. تحميل البيانات */
  renderRing();
  document.getElementById('profileName').textContent  = localStorage.getItem('userName')  || 'مستخدم عقاري';
  document.getElementById('profileEmail').textContent = localStorage.getItem('userEmail') || '';

  /* 4. إحصاءات */
  setTimeout(function() {
    var ads  = window.myProperties || [];
    var favs = window.favorites    || [];
    document.getElementById('myAdsCount').textContent      = ads.length;
    document.getElementById('myAdsCountBadge').textContent = ads.length;
    document.getElementById('favsCount').textContent       = favs.length;
    document.getElementById('viewsCount').textContent      =
      ads.reduce(function(a, p) { return a + (p.views || 0); }, 0).toLocaleString();

    var sec = document.getElementById('myAdsSection');
    if (ads.length && sec) {
      sec.innerHTML = ads.slice(0, 5).map(function(p) {
        var imgs = window.getPropImages ? window.getPropImages(p) : [];
        var img  = imgs[0] || '';
        return '<div onclick="gotoDetails(' + p.id + ')" '
          + 'style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">'
          + '<div style="width:52px;height:52px;border-radius:10px;overflow:hidden;'
          + 'background:var(--gray-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gray)">'
          + (img ? '<img src="' + img + '" style="width:100%;height:100%;object-fit:cover">'
                 : '<i class="fas fa-building"></i>')
          + '</div><div style="flex:1;overflow:hidden">'
          + '<div style="font-weight:700;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
          + p.title + '</div>'
          + '<div style="font-size:0.77rem;color:var(--accent);font-weight:700;margin-top:2px">$'
          + (p.price || 0).toLocaleString('en-US') + ' USD</div>'
          + '</div></div>';
      }).join('');
    }
  }, 350);
});

})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>
</body>
</html>
