<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e67e22">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقاري">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>حسابي - عقاري</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
/* ─── صورة البروفايل ─── */
.pic-wrap {
  position: relative;
  width: 90px;
  height: 90px;
  margin: 0 auto 14px;
}
.pic-circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  overflow: hidden;
  background: var(--gray-light);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(230,126,34,0.22);
}
.pic-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.pic-circle .pic-icon {
  font-size: 2.2rem;
  color: var(--accent);
}
.pic-edit-btn {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: 2.5px solid var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.68rem;
  box-shadow: 0 2px 8px rgba(230,126,34,0.45);
  cursor: pointer;
  z-index: 2;
}

/* ─── Modal القص ─── */
#crop-modal {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: rgba(0,0,0,0.96);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#crop-modal.show { display: flex; }

.crop-circle {
  position: relative;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--accent);
  background: #111;
  cursor: grab;
  touch-action: none;
  box-shadow: 0 0 0 5px rgba(230,126,34,0.18), 0 10px 40px rgba(0,0,0,0.7);
  flex-shrink: 0;
}
.crop-circle img {
  position: absolute;
  display: block;
  pointer-events: none;
  user-select: none;
}
.crop-hint {
  color: rgba(255,255,255,0.4);
  font-size: 0.72rem;
  margin-top: 10px;
  text-align: center;
}
.crop-btns {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  width: 100%;
  max-width: 300px;
}
.crop-btn-no {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.75);
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
}
.crop-btn-yes {
  flex: 1.5;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #f97316, #dc2626);
  color: white;
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(249,115,22,0.4);
}
.crop-btn-yes:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <i class="fas fa-user" style="color:var(--accent);margin-left:8px"></i>حسابي
  </div>
  <a href="settings.html" class="header-icon-btn">
    <i class="fas fa-cog"></i>
  </a>
</header>

<div class="container">

  <!-- صورة البروفايل -->
  <div class="profile-header">
    <div class="pic-wrap">
      <div class="pic-circle" id="picCircle">
        <i class="fas fa-user pic-icon"></i>
      </div>
      <div class="pic-edit-btn" id="picEditBtn">
        <i class="fas fa-camera" id="picEditIcon"></i>
      </div>
    </div>

    <h3 id="profileName" style="margin-bottom:4px;font-size:1.2rem;font-weight:800">
      مستخدم عقاري
    </h3>
    <p id="profileEmail" style="color:var(--gray);font-size:0.88rem;margin-bottom:8px"></p>
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(39,174,96,0.1);
      padding:4px 14px;border-radius:20px;font-size:0.78rem;color:var(--success);
      border:1px solid rgba(39,174,96,0.2)">
      <i class="fas fa-shield-alt"></i> حساب موثق
    </div>
  </div>

  <!-- إحصاءات -->
  <div class="stat-box" style="margin-bottom:20px">
    <div class="stat">
      <span class="stat-num" id="myAdsCount">0</span>
      <span class="stat-label">إعلاناتي</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="favsCount">0</span>
      <span class="stat-label">مفضلة</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="viewsCount">0</span>
      <span class="stat-label">مشاهدات</span>
    </div>
  </div>

  <!-- أزرار سريعة -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
    <a href="add-property.html" style="text-decoration:none;
      background:linear-gradient(135deg,var(--accent),var(--accent-hover));
      color:white;padding:14px;border-radius:12px;
      display:flex;align-items:center;gap:10px;font-weight:700;font-size:0.88rem">
      <i class="fas fa-plus-circle fa-lg"></i><span>إضافة إعلان</span>
    </a>
    <a href="favorites.html" style="text-decoration:none;background:var(--gray-light);
      color:var(--text);padding:14px;border-radius:12px;
      display:flex;align-items:center;gap:10px;font-weight:700;font-size:0.88rem;
      border:1px solid var(--border)">
      <i class="fas fa-heart" style="color:var(--danger)"></i><span>المفضلة</span>
    </a>
  </div>

  <!-- إعلاناتي -->
  <div style="background:var(--card);border-radius:var(--radius-md);
    border:1px solid var(--border);overflow:hidden;margin-bottom:16px;
    box-shadow:var(--shadow-sm)">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:800;font-size:0.9rem">
        <i class="fas fa-clipboard-list" style="color:var(--accent);margin-left:8px"></i>
        إعلاناتي
      </span>
      <span id="myAdsCountBadge" style="background:var(--accent-light);color:var(--accent);
        padding:2px 10px;border-radius:99px;font-size:0.75rem;font-weight:700">0</span>
    </div>
    <div id="myAdsSection" style="padding:16px">
      <div class="empty-state" style="padding:16px 0">
        <i class="fas fa-plus-square" style="font-size:1.8rem;opacity:0.4;margin-bottom:10px"></i>
        <p style="font-size:0.85rem;font-weight:600;margin-bottom:6px">لم تنشر أي إعلانات بعد</p>
        <a href="add-property.html" style="font-size:0.8rem;color:var(--accent);
          text-decoration:none;font-weight:700">انشر إعلانك الأول →</a>
      </div>
    </div>
  </div>

  <!-- القائمة -->
  <ul class="menu-list">
    <a href="settings.html" class="menu-item">
      <span><i class="fas fa-cog" style="margin-left:10px;color:var(--gray)"></i>الإعدادات</span>
      <i class="fas fa-chevron-left" style="font-size:0.75rem;color:var(--gray)"></i>
    </a>
    <a href="notifications.html" class="menu-item">
      <span><i class="fas fa-bell" style="margin-left:10px;color:var(--gray)"></i>الإشعارات</span>
    </a>
    <li class="menu-item danger" onclick="handleLogout&&handleLogout()">
      <span><i class="fas fa-sign-out-alt" style="margin-left:10px"></i>تسجيل الخروج</span>
    </li>
  </ul>

  <p style="text-align:center;color:var(--gray);font-size:0.72rem;margin:20px 0 8px">
    عقاري v3.0 © 2025
  </p>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html"     class="nav-item" data-page="index">
    <i class="fas fa-home"></i><span>الرئيسية</span>
  </a>
  <a href="favorites.html" class="nav-item" data-page="favorites">
    <i class="fas fa-heart"></i><span>المفضلة</span>
  </a>
  <a href="messages.html"  class="nav-item" data-page="messages">
    <i class="fas fa-comment-dots"></i><span>الرسائل</span>
  </a>
  <a href="profile.html"   class="nav-item active" data-page="profile">
    <i class="fas fa-user"></i><span>حسابي</span>
  </a>
</nav>

<div id="toast"></div>

<!-- ═══ Modal القص ═══ -->
<div id="crop-modal">
  <div style="color:white;font-size:0.95rem;font-weight:800;margin-bottom:14px;
    display:flex;align-items:center;gap:8px">
    <i class="fas fa-crop-alt" style="color:var(--accent)"></i> اضبط الصورة
  </div>

  <div class="crop-circle" id="cropCircle">
    <img id="cropImg" src="" alt="">
  </div>

  <div class="crop-hint">
    <i class="fas fa-hand-pointer" style="margin-left:4px"></i>اسحب لتحريك
    &nbsp;·&nbsp;
    <i class="fas fa-search-plus" style="margin-left:4px"></i>إصبعان للتكبير
  </div>

  <div class="crop-btns">
    <button class="crop-btn-no" id="cropCancelBtn">
      <i class="fas fa-times" style="margin-left:5px"></i>إلغاء
    </button>
    <button class="crop-btn-yes" id="cropSaveBtn">
      <i class="fas fa-check" style="margin-left:5px"></i>حفظ
    </button>
  </div>
</div>

<script src="js/app.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   نظام صورة البروفايل — نهائي
═══════════════════════════════════════════════════════════ */
(function () {

  var SZ = 280, OUT = 400;
  var X = 0, Y = 0, S = 1, SMIN = 1, SMAX = 8;
  var NW = 0, NH = 0, SRC = '';
  var dragging = false, startX = 0, startY = 0, startImgX = 0, startImgY = 0;
  var pinchDist = 0;

  /* ─── تحديث موضع الصورة ─── */
  function applyPos() {
    var dw = NW * S, dh = NH * S;
    if (X > 0) X = 0;
    if (Y > 0) Y = 0;
    if (X < SZ - dw) X = SZ - dw;
    if (Y < SZ - dh) Y = SZ - dh;
    var img = document.getElementById('cropImg');
    if (!img) return;
    img.style.left   = X + 'px';
    img.style.top    = Y + 'px';
    img.style.width  = (NW * S) + 'px';
    img.style.height = (NH * S) + 'px';
  }

  /* ─── تكبير من نقطة ─── */
  function applyZoom(ns, cx, cy) {
    ns = Math.min(SMAX, Math.max(SMIN, ns));
    var r = ns / S;
    X = cx - (cx - X) * r;
    Y = cy - (cy - Y) * r;
    S = ns;
    applyPos();
  }

  /* ─── فتح المقص ─── */
  function openCropper(src) {
    SRC = src;
    var tmp = new Image();
    tmp.onload = function () {
      NW = tmp.naturalWidth;
      NH = tmp.naturalHeight;

      SZ   = Math.min(290, window.innerWidth - 60);
      SMIN = Math.max(SZ / NW, SZ / NH) * 1.001;
      SMAX = SMIN * 7;
      S    = SMIN;
      X    = (SZ - NW * S) / 2;
      Y    = (SZ - NH * S) / 2;

      var circle = document.getElementById('cropCircle');
      if (circle) {
        circle.style.width  = SZ + 'px';
        circle.style.height = SZ + 'px';
      }

      var img = document.getElementById('cropImg');
      if (img) {
        img.style.cssText = 'position:absolute;display:block;pointer-events:none;user-select:none';
        img.onload = function () { applyPos(); };
        img.src    = src;
        if (img.complete && img.naturalWidth > 0) applyPos();
      }

      var modal = document.getElementById('crop-modal');
      if (modal) modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    };
    tmp.onerror = function () {
      if (showToast) showToast('تعذر فتح الصورة');
    };
    tmp.src = src;
  }

  /* ─── إغلاق المقص ─── */
  function closeCropper() {
    var modal = document.getElementById('crop-modal');
    if (modal) modal.classList.remove('show');
    document.body.style.overflow = '';
  }

  /* ─── حفظ الصورة ─── */
  function savePhoto() {
    var btn = document.getElementById('cropSaveBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }

    try {
      var canvas = document.createElement('canvas');
      canvas.width = canvas.height = OUT;
      var ctx = canvas.getContext('2d');
      var ratio = OUT / SZ;

      ctx.beginPath();
      ctx.arc(OUT / 2, OUT / 2, OUT / 2, 0, Math.PI * 2);
      ctx.clip();

      var img = document.getElementById('cropImg');
      ctx.drawImage(img, X * ratio, Y * ratio, NW * S * ratio, NH * S * ratio);

      var url = canvas.toDataURL('image/jpeg', 0.92);
      localStorage.setItem('userPhoto', url);
      renderPhoto();
      closeCropper();
      if (showToast) showToast('تم حفظ الصورة');
    } catch (e) {
      if (showToast) showToast('خطأ في الحفظ');
      console.error(e);
    }

    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check" style="margin-left:5px"></i>حفظ'; }
  }

  /* ─── عرض الصورة في الدائرة ─── */
  function renderPhoto() {
    var circle = document.getElementById('picCircle');
    var icon   = document.getElementById('picEditIcon');
    var photo  = localStorage.getItem('userPhoto');
    if (!circle) return;

    if (photo) {
      circle.innerHTML =
        '<img src="' + photo + '" '
        + 'onerror="this.parentElement.innerHTML='<i class=\"fas fa-user pic-icon\"></i>'">';
      if (icon) icon.className = 'fas fa-pen';
    } else {
      circle.innerHTML = '<i class="fas fa-user pic-icon"></i>';
      if (icon) icon.className = 'fas fa-camera';
    }
  }

  /* ─── فتح الملف ─── */
  function pickFile() {
    /* أنشئ input جديد في كل مرة لضمان عمل change */
    var old = document.getElementById('_tmpFileInput');
    if (old) old.remove();

    var inp = document.createElement('input');
    inp.type    = 'file';
    inp.id      = '_tmpFileInput';
    inp.accept  = 'image/*';
    inp.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0';

    inp.addEventListener('change', function () {
      var file = inp.files && inp.files[0];
      inp.remove();
      if (!file || !file.type.startsWith('image/')) return;
      var reader = new FileReader();
      reader.onload = function (e) { openCropper(e.target.result); };
      reader.readAsDataURL(file);
    });

    document.body.appendChild(inp);

    /* تأخير قصير قبل الـ click لضمان إضافته للـ DOM */
    setTimeout(function () { inp.click(); }, 50);
  }

  /* ─── السحب ─── */
  var cc = null;

  function getCircle() {
    return cc || (cc = document.getElementById('cropCircle'));
  }

  document.addEventListener('mousedown', function (e) {
    if (!getCircle().contains(e.target)) return;
    dragging = true;
    startX    = e.clientX; startY    = e.clientY;
    startImgX = X;         startImgY = Y;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    X = startImgX + (e.clientX - startX);
    Y = startImgY + (e.clientY - startY);
    applyPos();
  });
  document.addEventListener('mouseup', function () { dragging = false; });

  document.addEventListener('touchstart', function (e) {
    var c = getCircle();
    if (!c || !c.contains(e.target)) return;
    if (e.touches.length === 1) {
      dragging  = true;
      pinchDist = 0;
      startX    = e.touches[0].clientX; startY    = e.touches[0].clientY;
      startImgX = X;                    startImgY = Y;
    } else if (e.touches.length === 2) {
      dragging  = false;
      pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    var c = getCircle();
    if (!c) return;
    if (e.touches.length === 1 && dragging) {
      X = startImgX + (e.touches[0].clientX - startX);
      Y = startImgY + (e.touches[0].clientY - startY);
      applyPos();
    } else if (e.touches.length === 2 && pinchDist > 0) {
      var d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      var rect = c.getBoundingClientRect();
      applyZoom(
        S * (d / pinchDist),
        (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
        (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top
      );
      pinchDist = d;
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function () {
    dragging = false;
    pinchDist = 0;
  });

  /* ─── ربط الأزرار ─── */
  document.addEventListener('DOMContentLoaded', function () {

    /* دائرة الصورة */
    var circle = document.getElementById('picCircle');
    if (circle) {
      circle.style.cursor = 'pointer';
      circle.addEventListener('click', function () {
        var photo = localStorage.getItem('userPhoto');
        if (photo) {
          openCropper(photo); /* تعديل الصورة المحفوظة */
        } else {
          pickFile();
        }
      });
    }

    /* زر القلم/الكاميرا */
    var editBtn = document.getElementById('picEditBtn');
    if (editBtn) {
      editBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var photo = localStorage.getItem('userPhoto');
        if (photo) {
          openCropper(photo);
        } else {
          pickFile();
        }
      });
    }

    /* أزرار المقص */
    var cancelBtn = document.getElementById('cropCancelBtn');
    var saveBtn   = document.getElementById('cropSaveBtn');
    if (cancelBtn) cancelBtn.addEventListener('click', closeCropper);
    if (saveBtn)   saveBtn.addEventListener('click', savePhoto);

    /* عند الضغط خارج المقص */
    var modal = document.getElementById('crop-modal');
    if (modal) {
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeCropper();
      });
    }

    /* تحميل بيانات المستخدم */
    renderPhoto();
    var nameEl  = document.getElementById('profileName');
    var emailEl = document.getElementById('profileEmail');
    if (nameEl)  nameEl.textContent  = localStorage.getItem('userName')  || 'مستخدم عقاري';
    if (emailEl) emailEl.textContent = localStorage.getItem('userEmail') || '';

    setTimeout(function () {
      var ads  = window.myProperties || [];
      var favs = window.favorites    || [];

      var el;
      el = document.getElementById('myAdsCount');      if (el) el.textContent = ads.length;
      el = document.getElementById('myAdsCountBadge'); if (el) el.textContent = ads.length;
      el = document.getElementById('favsCount');       if (el) el.textContent = favs.length;
      el = document.getElementById('viewsCount');
      if (el) el.textContent = ads.reduce(function (a, p) { return a + (p.views || 0); }, 0).toLocaleString();

      var sec = document.getElementById('myAdsSection');
      if (ads.length && sec) {
        sec.innerHTML = ads.slice(0, 5).map(function (p) {
          var img = (window.getPropImages ? window.getPropImages(p) : [])[0] || '';
          return '<div onclick="gotoDetails(' + p.id + ')" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">'
            + '<div style="width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--gray-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gray)">'
            + (img ? '<img src="' + img + '" style="width:100%;height:100%;object-fit:cover">' : '<i class="fas fa-building"></i>')
            + '</div><div style="flex:1;overflow:hidden">'
            + '<div style="font-weight:700;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + p.title + '</div>'
            + '<div style="font-size:0.77rem;color:var(--accent);font-weight:700;margin-top:2px">$' + (p.price || 0).toLocaleString('en-US') + '</div>'
            + '</div></div>';
        }).join('');
      }
    }, 400);
  });

  /* اجعل pickFile متاحة عالمياً */
  window._pickProfilePhoto = pickFile;

})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
