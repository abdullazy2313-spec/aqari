<style>
/* ── صورة البروفايل ── */
.pic-outer {
  position: relative;
  width: 96px; height: 96px;
  margin: 0 auto 14px;
}
/* label يغطي الدائرة كاملاً = نقر في أي مكان يفتح المعرض */
.pic-label {
  display: block;
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 3.5px solid var(--accent);
  overflow: hidden;
  background: var(--gray-light);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(230,126,34,0.25);
  position: relative;
}
.pic-label img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 50%;
}
.pic-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.pic-placeholder i { font-size: 2.4rem; color: var(--accent); }
/* أيقونة الكاميرا/القلم */
.pic-badge {
  position: absolute;
  bottom: 2px; left: 2px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: 2.5px solid var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
  box-shadow: 0 2px 10px rgba(230,126,34,0.5);
  pointer-events: none; /* لا يمنع النقر على الـ label */
}

/* ── Modal القص ── */
#CROP {
  position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.97);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px;
}
#CROP.open { display: flex; }

.crop-title {
  color: white; font-size: 0.95rem; font-weight: 800;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.crop-title i { color: var(--accent); }

/* دائرة القص */
#crop-circle {
  position: relative;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--accent);
  background: #111;
  cursor: grab;
  touch-action: none;
  box-shadow: 0 0 0 6px rgba(230,126,34,0.15), 0 12px 48px rgba(0,0,0,0.7);
  flex-shrink: 0;
}
#crop-circle.grabbing { cursor: grabbing; }

/* الصورة داخل الدائرة — left/top/width/height للعرض والحفظ */
#crop-img {
  position: absolute;
  display: block;
  pointer-events: none;
  user-select: none;
  touch-action: none;
}

.crop-hint {
  color: rgba(255,255,255,0.4);
  font-size: 0.72rem;
  margin-top: 10px;
  text-align: center;
  line-height: 1.6;
}
.crop-actions {
  display: flex; gap: 10px;
  margin-top: 16px;
  width: 100%; max-width: 320px;
}
.crop-btn-cancel {
  flex: 1; padding: 13px; border-radius: 13px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
  font-family: var(--font); font-size: 0.88rem; font-weight: 700;
  cursor: pointer;
}
.crop-btn-save {
  flex: 1.6; padding: 13px; border-radius: 13px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: white;
  font-family: var(--font); font-size: 0.88rem; font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(230,126,34,0.4);
}
.crop-btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>

<div id="CROP-MODAL" style="display:none;position:fixed;inset:0;z-index:99999;

      color:rgba(255,255,255,0.8);font-family:var(--font);font-size:0.88rem;font-weight:700;cursor:pointer">

      border-radius:13px;border:none;

      color:white;font-family:var(--font);font-size:0.88rem;font-weight:800;cursor:pointer;
      box-shadow:0 4px 16px rgba(230,126,34,0.4)">

<script src="js/app.js"><script src="js/app.js"></script>
<script>
/* ════════════════════════════════════════════════
   handlePhotoChange — يُستدعى مباشرة من onchange
   هذا أضمن من addEventListener على Android
════════════════════════════════════════════════ */

/* متغيرات القص */
var _SZ=280, _OUT=400, _X=0, _Y=0, _S=1, _SMIN=1, _SMAX=8;
var _NW=0, _NH=0, _SRC='';
var _drag=false, _sx=0, _sy=0, _ox=0, _oy=0, _pd=0;

/* ── فتح المعرض عند الضغط على القلم (للتعديل) ── */
function openPicker() {
  document.getElementById('pic-file-input').click();
}

/* ── معالج اختيار الصورة (inline onchange) ── */
function handlePhotoChange(e) {
  var input = e.target || e;
  var file  = input.files && input.files[0];
  if (!file) return;
  
  /* امسح الاختيار حتى يمكن اختيار نفس الصورة مرة أخرى */
  setTimeout(function(){ input.value = ''; }, 100);

  if (!file.type.startsWith('image/')) return;

  var reader = new FileReader();
  reader.onload = function(ev) { _openCrop(ev.target.result); };
  reader.onerror = function() {
    if (typeof showToast === 'function') showToast('تعذر قراءة الصورة');
  };
  reader.readAsDataURL(file);
}
window.handlePhotoChange = handlePhotoChange;

/* ── القلم: يعيد فتح المقص بالصورة المحفوظة ── */
function _penClick(e) {
  e.preventDefault();
  e.stopPropagation();
  var saved = localStorage.getItem('userPhoto');
  if (saved) {
    _openCrop(saved);
  } else {
    document.getElementById('pic-file-input').click();
  }
}

/* ── عرض الصورة في الحلقة ── */
function _renderRing() {
  var ring  = document.getElementById('PR');
  var icon  = document.getElementById('PC-icon');
  var input = document.getElementById('pic-file-input');
  var pc    = document.getElementById('PC');
  var photo = localStorage.getItem('userPhoto');

  if (!ring) return;

  if (photo) {
    ring.innerHTML =
      '<img src="' + photo + '" '
      + 'style="width:100%;height:100%;object-fit:cover;'
      + 'display:block;border-radius:50%;pointer-events:none" '
      + 'onerror="this.parentElement.innerHTML='
      + "'<i class=\'fas fa-user\' style=\'font-size:2.4rem;"
      + "color:var(--accent)\'></i>'""
      + '>';
    if (icon) icon.className = 'fas fa-pen';
    /* القلم يفتح المقص للتعديل — نخفي الـ input خلفه */
    if (pc) {
      pc.style.zIndex = '20';
      pc.onclick = _penClick;
      /* أخفِ input تحت القلم */
      if (input) input.style.zIndex = '5';
    }
  } else {
    ring.innerHTML = '<i class="fas fa-user" style="font-size:2.4rem;color:var(--accent);pointer-events:none"></i>';
    if (icon) icon.className = 'fas fa-camera';
    if (pc) { pc.style.zIndex = '5'; pc.onclick = null; }
    if (input) input.style.zIndex = '10';
  }
}

/* ── فتح المقص ── */
function _openCrop(src) {
  _SRC = src;
  var loader = new Image();
  loader.onload = function() {
    _NW = loader.naturalWidth;
    _NH = loader.naturalHeight;
    _SZ = Math.min(300, window.innerWidth - 64);

    var circle = document.getElementById('crop-circle');
    if (circle) { circle.style.width = _SZ+'px'; circle.style.height = _SZ+'px'; }

    _SMIN = Math.max(_SZ/_NW, _SZ/_NH) * 1.001;
    _SMAX = _SMIN * 8;
    _S    = _SMIN;
    _X    = (_SZ - _NW*_S) / 2;
    _Y    = (_SZ - _NH*_S) / 2;

    var img = document.getElementById('crop-img');
    if (img) {
      img.style.cssText = '';
      img.onload = function() { _draw(); };
      img.src = src;
      if (img.complete && img.naturalWidth > 0) _draw();
    }

    var modal = document.getElementById('CROP-MODAL');
    if (modal) {
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
  };
  loader.onerror = function() {
    if (typeof showToast === 'function') showToast('تعذر فتح الصورة');
  };
  loader.src = src;
}

/* ── رسم الصورة ── */
function _draw() {
  var dw = _NW * _S, dh = _NH * _S;
  if (_X > 0) _X = 0;
  if (_Y > 0) _Y = 0;
  if (_X < _SZ - dw) _X = _SZ - dw;
  if (_Y < _SZ - dh) _Y = _SZ - dh;
  var img = document.getElementById('crop-img');
  if (!img) return;
  img.style.position = 'absolute';
  img.style.left   = _X + 'px';
  img.style.top    = _Y + 'px';
  img.style.width  = dw + 'px';
  img.style.height = dh + 'px';
}

/* ── تكبير ── */
function _zoom(ns, cx, cy) {
  ns = Math.min(_SMAX, Math.max(_SMIN, ns));
  var r = ns / _S;
  _X = cx - (cx - _X) * r;
  _Y = cy - (cy - _Y) * r;
  _S = ns;
  _draw();
}

/* ── إغلاق المقص ── */
function _closeCrop() {
  var modal = document.getElementById('CROP-MODAL');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
}

/* ── حفظ الصورة ── */
function _saveCrop() {
  var btn = document.getElementById('crop-save-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:6px"></i>جاري...'; }

  var img = document.getElementById('crop-img');
  var ratio = _OUT / _SZ;

  function doRender(srcImg) {
    var canvas = document.createElement('canvas');
    canvas.width = canvas.height = _OUT;
    var ctx = canvas.getContext('2d');
    ctx.save();
    ctx.beginPath();
    ctx.arc(_OUT/2, _OUT/2, _OUT/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(srcImg, _X*ratio, _Y*ratio, _NW*_S*ratio, _NH*_S*ratio);
    ctx.restore();
    var url = canvas.toDataURL('image/jpeg', 0.92);
    localStorage.setItem('userPhoto', url);
    _renderRing();
    _closeCrop();
    if (typeof showToast === 'function') showToast('تم حفظ الصورة بنجاح');
    if (btn) { btn.disabled=false; btn.innerHTML='<i class="fas fa-check" style="margin-left:6px"></i>حفظ الصورة'; }
  }

  if (img && img.complete && img.naturalWidth > 0) {
    doRender(img);
  } else {
    var tmp = new Image();
    tmp.onload = function() { doRender(tmp); };
    tmp.onerror = function() {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="fas fa-check" style="margin-left:6px"></i>حفظ الصورة'; }
      if (typeof showToast === 'function') showToast('خطأ في الحفظ');
    };
    tmp.src = _SRC;
  }
}
window._saveCrop = _saveCrop;
window._closeCrop = _closeCrop;

/* ── السحب والتكبير ── */
document.addEventListener('mousedown', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c || !c.contains(e.target)) return;
  _drag=true; _sx=e.clientX; _sy=e.clientY; _ox=_X; _oy=_Y;
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!_drag) return;
  _X=_ox+(e.clientX-_sx); _Y=_oy+(e.clientY-_sy); _draw();
});
document.addEventListener('mouseup', function() { _drag=false; });

document.addEventListener('touchstart', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c || !c.contains(e.target)) return;
  if (e.touches.length===1) {
    _drag=true; _pd=0;
    _sx=e.touches[0].clientX; _sy=e.touches[0].clientY; _ox=_X; _oy=_Y;
  } else if (e.touches.length===2) {
    _drag=false;
    _pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                   e.touches[0].clientY-e.touches[1].clientY);
  }
  e.preventDefault();
},{passive:false});

document.addEventListener('touchmove', function(e) {
  var c = document.getElementById('crop-circle');
  if (!c) return;
  if (e.touches.length===1 && _drag) {
    _X=_ox+(e.touches[0].clientX-_sx); _Y=_oy+(e.touches[0].clientY-_sy); _draw();
  } else if (e.touches.length===2 && _pd>0) {
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                     e.touches[0].clientY-e.touches[1].clientY);
    var rect=c.getBoundingClientRect();
    _zoom(_S*(d/_pd),
      (e.touches[0].clientX+e.touches[1].clientX)/2-rect.left,
      (e.touches[0].clientY+e.touches[1].clientY)/2-rect.top);
    _pd=d;
  }
  if (c.contains(e.target)||_drag) e.preventDefault();
},{passive:false});

document.addEventListener('touchend', function() { _drag=false; _pd=0; });

/* ── تهيئة ── */
document.addEventListener('DOMContentLoaded', function() {
  _renderRing();
  var n  = document.getElementById('profileName');
  var em = document.getElementById('profileEmail');
  if (n)  n.textContent  = localStorage.getItem('userName')  || 'مستخدم عقاري';
  if (em) em.textContent = localStorage.getItem('userEmail') || '';

  setTimeout(function() {
    var ads  = window.myProperties || [];
    var favs = window.favorites    || [];
    var ac = document.getElementById('myAdsCount');
    var ab = document.getElementById('myAdsCountBadge');
    var fc = document.getElementById('favsCount');
    var vc = document.getElementById('viewsCount');
    if (ac) ac.textContent = ads.length;
    if (ab) ab.textContent = ads.length;
    if (fc) fc.textContent = favs.length;
    if (vc) vc.textContent = ads.reduce(function(a,p){return a+(p.views||0);},0).toLocaleString();
    var sec = document.getElementById('myAdsSection');
    if (ads.length && sec) {
      sec.innerHTML = ads.slice(0,5).map(function(p){
        var imgs = window.getPropImages ? window.getPropImages(p) : [];
        var img  = imgs[0] || '';
        return '<div onclick="gotoDetails('+p.id+')" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">'
          +'<div style="width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--gray-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gray)">'
          +(img?'<img src="'+img+'" style="width:100%;height:100%;object-fit:cover">':'<i class="fas fa-building"></i>')
          +'</div><div style="flex:1;overflow:hidden">'
          +'<div style="font-weight:700;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.title+'</div>'
          +'<div style="font-size:0.77rem;color:var(--accent);font-weight:700;margin-top:2px">$'+(p.price||0).toLocaleString('en-US')+' USD</div>'
          +'</div></div>';
      }).join('');
    }
  }, 350);
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>
</body>
</html>
