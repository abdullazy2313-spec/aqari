<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>حسابي - عقاري</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.av-wrap{position:relative;width:90px;height:90px;margin:0 auto 14px}
.av-circle{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);
  overflow:hidden;background:var(--gray-light);display:flex;align-items:center;
  justify-content:center;box-shadow:0 4px 18px rgba(230,126,34,0.22)}
.av-circle img{width:100%;height:100%;object-fit:cover;display:block}
.av-circle .av-icon{font-size:2.2rem;color:var(--accent)}
.av-badge{position:absolute;bottom:0;left:0;width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:white;border:2.5px solid var(--card);
  display:flex;align-items:center;justify-content:center;font-size:0.7rem;
  box-shadow:0 2px 8px rgba(230,126,34,0.4);z-index:1}
#cropModal{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.96);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#cropModal.show{display:flex}
#cropCircle{position:relative;border-radius:50%;overflow:hidden;
  border:3px solid var(--accent);background:#111;touch-action:none;
  box-shadow:0 0 0 5px rgba(230,126,34,0.15),0 12px 40px rgba(0,0,0,0.7);flex-shrink:0}
#cropImg{position:absolute;display:block;pointer-events:none;user-select:none}
.cp-hint{color:rgba(255,255,255,0.4);font-size:0.72rem;margin-top:10px;text-align:center}
.cp-btns{display:flex;gap:10px;margin-top:16px;width:100%;max-width:300px}
.cp-no{flex:1;padding:13px;border-radius:13px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.75);
  font-family:var(--font);font-size:0.88rem;font-weight:700;cursor:pointer}
.cp-yes{flex:1.5;padding:13px;border-radius:13px;border:none;
  background:linear-gradient(135deg,#f97316,#dc2626);color:white;
  font-family:var(--font);font-size:0.88rem;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(249,115,22,0.4)}
.cp-yes:disabled{opacity:0.5;cursor:not-allowed}
</style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-user" style="color:var(--accent);margin-left:8px"></i>حسابي</div>
  <a href="settings.html" class="header-icon-btn"><i class="fas fa-cog"></i></a>
</header>

<div class="container">
  <div class="profile-header">

    <!-- STEP 1: صورة البروفايل -->
    <div class="av-wrap">
      <div class="av-circle" id="avCircle">
        <i class="fas fa-user av-icon"></i>
      </div>
      <div class="av-badge" id="avBadge"><i class="fas fa-camera"></i></div>
      <!--
        STEP 2: input الملف — شفاف فوق الدائرة
        onchange يستدعي pickPhoto() مباشرة
      -->
      <input type="file" id="fileInput" accept="image/*"
        onchange="pickPhoto(event)"
        style="position:absolute;inset:0;width:100%;height:100%;
               opacity:0;cursor:pointer;z-index:2;border-radius:50%">
    </div>

    <h3 id="profileName" style="margin-bottom:4px;font-size:1.2rem;font-weight:800">مستخدم عقاري</h3>
    <p id="profileEmail" style="color:var(--gray);font-size:0.88rem;margin-bottom:10px"></p>
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(39,174,96,0.1);
      padding:4px 14px;border-radius:20px;font-size:0.78rem;color:var(--success);
      border:1px solid rgba(39,174,96,0.2)">
      <i class="fas fa-shield-alt"></i> حساب موثق
    </div>
  </div>

  <div class="stat-box" style="margin-bottom:20px">
    <div class="stat"><span class="stat-num" id="adsCount">0</span><span class="stat-label">إعلاناتي</span></div>
    <div class="stat"><span class="stat-num" id="favsCount">0</span><span class="stat-label">مفضلة</span></div>
    <div class="stat"><span class="stat-num" id="viewsCount">0</span><span class="stat-label">مشاهدات</span></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
    <a href="add-property.html" style="text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:white;padding:14px;border-radius:12px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:0.88rem">
      <i class="fas fa-plus-circle fa-lg"></i><span>إضافة إعلان</span>
    </a>
    <a href="favorites.html" style="text-decoration:none;background:var(--gray-light);color:var(--text);padding:14px;border-radius:12px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:0.88rem;border:1px solid var(--border)">
      <i class="fas fa-heart" style="color:var(--danger)"></i><span>المفضلة</span>
    </a>
  </div>

  <div style="background:var(--card);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-sm)">
    <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:800;font-size:0.9rem"><i class="fas fa-clipboard-list" style="color:var(--accent);margin-left:8px"></i>إعلاناتي</span>
      <span id="adsBadge" style="background:var(--accent-light);color:var(--accent);padding:2px 10px;border-radius:99px;font-size:0.75rem;font-weight:700">0</span>
    </div>
    <div id="adsSection" style="padding:16px">
      <div class="empty-state" style="padding:16px 0">
        <i class="fas fa-plus-square" style="font-size:1.8rem;opacity:0.4;margin-bottom:10px"></i>
        <p style="font-size:0.85rem;font-weight:600;margin-bottom:6px">لم تنشر أي إعلانات بعد</p>
        <a href="add-property.html" style="font-size:0.8rem;color:var(--accent);text-decoration:none;font-weight:700">انشر إعلانك الأول →</a>
      </div>
    </div>
  </div>

  <ul class="menu-list">
    <a href="settings.html" class="menu-item">
      <span><i class="fas fa-cog" style="margin-left:10px;color:var(--gray)"></i>الإعدادات</span>
      <i class="fas fa-chevron-left" style="font-size:0.75rem;color:var(--gray)"></i>
    </a>
    <a href="notifications.html" class="menu-item">
      <span><i class="fas fa-bell" style="margin-left:10px;color:var(--gray)"></i>الإشعارات</span>
    </a>
    <li class="menu-item danger" onclick="if(typeof handleLogout==='function')handleLogout()">
      <span><i class="fas fa-sign-out-alt" style="margin-left:10px"></i>تسجيل الخروج</span>
    </li>
  </ul>
  <p style="text-align:center;color:var(--gray);font-size:0.72rem;margin:20px 0 8px">عقاري v3.0 © 2025</p>
</div>

<nav class="bottom-nav">
  <a href="index.html"     class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
  <a href="favorites.html" class="nav-item"><i class="fas fa-heart"></i><span>المفضلة</span></a>
  <a href="messages.html"  class="nav-item"><i class="fas fa-comment-dots"></i><span>الرسائل</span></a>
  <a href="profile.html"   class="nav-item active"><i class="fas fa-user"></i><span>حسابي</span></a>
</nav>
<div id="toast"></div>

<!-- STEP 3: Modal القص -->
<div id="cropModal">
  <div style="color:white;font-size:0.95rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px">
    <i class="fas fa-crop-alt" style="color:var(--accent)"></i> اضبط الصورة
  </div>
  <div id="cropCircle">
    <img id="cropImg" src="" alt="">
  </div>
  <div class="cp-hint"><i class="fas fa-hand-pointer" style="margin-left:3px"></i>اسحب &nbsp;·&nbsp; <i class="fas fa-search-plus" style="margin-left:3px"></i>إصبعان للتكبير</div>
  <div class="cp-btns">
    <button class="cp-no"  onclick="closeCrop()"><i class="fas fa-times"  style="margin-left:5px"></i>إلغاء</button>
    <button class="cp-yes" onclick="saveCrop()" id="saveBtn"><i class="fas fa-check" style="margin-left:5px"></i>حفظ</button>
  </div>
</div>

<script src="js/app.js"></script>

<!-- STEP 4: كل الـ JS في global scope — بدون IIFE -->
<script>
/* ── متغيرات القص ── */
var CP_SZ = 280, CP_OUT = 400;
var CP_X = 0, CP_Y = 0, CP_S = 1, CP_SMIN = 1, CP_SMAX = 8;
var CP_NW = 0, CP_NH = 0, CP_SRC = '';
var CP_DRAG = false, CP_SX = 0, CP_SY = 0, CP_OX = 0, CP_OY = 0, CP_PD = 0;

/* STEP 4a: اختيار الصورة — يُستدعى من onchange inline */
function pickPhoto(event) {
  var file = event.target.files && event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    /* امسح القيمة بعد القراءة */
    try { event.target.value = ''; } catch(x) {}
    openCrop(e.target.result);
  };
  reader.readAsDataURL(file);
}

/* STEP 4b: فتح المقص */
function openCrop(src) {
  CP_SRC = src;
  var tmp = new Image();
  tmp.onload = function() {
    CP_NW = tmp.naturalWidth;
    CP_NH = tmp.naturalHeight;
    CP_SZ   = Math.min(290, window.innerWidth - 60);
    CP_SMIN = Math.max(CP_SZ / CP_NW, CP_SZ / CP_NH) * 1.001;
    CP_SMAX = CP_SMIN * 7;
    CP_S    = CP_SMIN;
    CP_X    = (CP_SZ - CP_NW * CP_S) / 2;
    CP_Y    = (CP_SZ - CP_NH * CP_S) / 2;
    /* حجم الدائرة */
    var circle = document.getElementById('cropCircle');
    circle.style.width  = CP_SZ + 'px';
    circle.style.height = CP_SZ + 'px';
    /* ضع الصورة */
    var img = document.getElementById('cropImg');
    img.style.cssText = 'position:absolute;display:block;pointer-events:none;user-select:none';
    img.onload = drawCrop;
    img.src = src;
    if (img.complete && img.naturalWidth > 0) drawCrop();
    /* أظهر المقص */
    document.getElementById('cropModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  };
  tmp.src = src;
}

/* STEP 4c: رسم الصورة */
function drawCrop() {
  var dw = CP_NW * CP_S, dh = CP_NH * CP_S;
  if (CP_X > 0) CP_X = 0;
  if (CP_Y > 0) CP_Y = 0;
  if (CP_X < CP_SZ - dw) CP_X = CP_SZ - dw;
  if (CP_Y < CP_SZ - dh) CP_Y = CP_SZ - dh;
  var img = document.getElementById('cropImg');
  img.style.left   = CP_X + 'px';
  img.style.top    = CP_Y + 'px';
  img.style.width  = dw + 'px';
  img.style.height = dh + 'px';
}

/* STEP 4d: تكبير */
function zoomCrop(ns, cx, cy) {
  ns = Math.min(CP_SMAX, Math.max(CP_SMIN, ns));
  var r = ns / CP_S;
  CP_X = cx - (cx - CP_X) * r;
  CP_Y = cy - (cy - CP_Y) * r;
  CP_S = ns;
  drawCrop();
}

/* STEP 4e: إغلاق */
function closeCrop() {
  document.getElementById('cropModal').classList.remove('show');
  document.body.style.overflow = '';
}

/* STEP 4f: حفظ */
function saveCrop() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
  try {
    var r = CP_OUT / CP_SZ;
    var canvas = document.createElement('canvas');
    canvas.width = canvas.height = CP_OUT;
    var ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(CP_OUT/2, CP_OUT/2, CP_OUT/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(document.getElementById('cropImg'), CP_X*r, CP_Y*r, CP_NW*CP_S*r, CP_NH*CP_S*r);
    var url = canvas.toDataURL('image/jpeg', 0.92);
    localStorage.setItem('userPhoto', url);
    showPhoto();
    closeCrop();
    if (typeof showToast === 'function') showToast('تم حفظ الصورة');
  } catch(e) {
    if (typeof showToast === 'function') showToast('خطأ في الحفظ');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-check" style="margin-left:5px"></i>حفظ';
}

/* STEP 4g: عرض الصورة في الدائرة */
function showPhoto() {
  var circle = document.getElementById('avCircle');
  var badge  = document.getElementById('avBadge');
  var photo  = localStorage.getItem('userPhoto');
  if (!circle) return;
  if (photo) {
    circle.innerHTML = '<img src="' + photo + '" onerror="this.parentElement.innerHTML='<i class=\'fas fa-user av-icon\'></i>'">';
    badge.innerHTML  = '<i class="fas fa-pen"></i>';
  } else {
    circle.innerHTML = '<i class="fas fa-user av-icon"></i>';
    badge.innerHTML  = '<i class="fas fa-camera"></i>';
  }
}

/* STEP 4h: السحب — Mouse */
document.addEventListener('mousedown', function(e) {
  var c = document.getElementById('cropCircle');
  if (!c || !c.contains(e.target)) return;
  CP_DRAG = true; CP_SX = e.clientX; CP_SY = e.clientY; CP_OX = CP_X; CP_OY = CP_Y;
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!CP_DRAG) return;
  CP_X = CP_OX + (e.clientX - CP_SX);
  CP_Y = CP_OY + (e.clientY - CP_SY);
  drawCrop();
});
document.addEventListener('mouseup', function() { CP_DRAG = false; });

/* STEP 4i: السحب — Touch */
document.addEventListener('touchstart', function(e) {
  var c = document.getElementById('cropCircle');
  if (!c || !c.contains(e.target)) return;
  if (e.touches.length === 1) {
    CP_DRAG = true; CP_PD = 0;
    CP_SX = e.touches[0].clientX; CP_SY = e.touches[0].clientY;
    CP_OX = CP_X; CP_OY = CP_Y;
  } else if (e.touches.length === 2) {
    CP_DRAG = false;
    CP_PD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
  }
  e.preventDefault();
}, {passive: false});

document.addEventListener('touchmove', function(e) {
  var c = document.getElementById('cropCircle');
  if (!c) return;
  if (e.touches.length === 1 && CP_DRAG) {
    CP_X = CP_OX + (e.touches[0].clientX - CP_SX);
    CP_Y = CP_OY + (e.touches[0].clientY - CP_SY);
    drawCrop();
  } else if (e.touches.length === 2 && CP_PD > 0) {
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
    var rect = c.getBoundingClientRect();
    zoomCrop(CP_S * (d / CP_PD),
      (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left,
      (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top);
    CP_PD = d;
  }
  e.preventDefault();
}, {passive: false});

document.addEventListener('touchend', function() { CP_DRAG = false; CP_PD = 0; });

/* STEP 4j: إغلاق بالضغط خارج المقص */
document.getElementById('cropModal').addEventListener('click', function(e) {
  if (e.target === this) closeCrop();
});

/* STEP 4k: تحميل البيانات عند فتح الصفحة */
window.addEventListener('load', function() {
  showPhoto();
  var n = document.getElementById('profileName');
  var m = document.getElementById('profileEmail');
  if (n) n.textContent = localStorage.getItem('userName')  || 'مستخدم عقاري';
  if (m) m.textContent = localStorage.getItem('userEmail') || '';

  setTimeout(function() {
    var ads  = window.myProperties || [];
    var favs = window.favorites    || [];
    function set(id, v) { var e=document.getElementById(id); if(e) e.textContent=v; }
    set('adsCount',  ads.length);
    set('adsBadge',  ads.length);
    set('favsCount', favs.length);
    set('viewsCount', ads.reduce(function(a,p){return a+(p.views||0);},0).toLocaleString());
    var sec = document.getElementById('adsSection');
    if (ads.length && sec) {
      sec.innerHTML = ads.slice(0,5).map(function(p) {
        var img = (window.getPropImages ? window.getPropImages(p) : [])[0] || '';
        return '<div onclick="gotoDetails('+p.id+')" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">'
          + '<div style="width:52px;height:52px;border-radius:10px;overflow:hidden;background:var(--gray-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gray)">'
          + (img ? '<img src="'+img+'" style="width:100%;height:100%;object-fit:cover">' : '<i class="fas fa-building"></i>')
          + '</div><div style="flex:1;overflow:hidden">'
          + '<div style="font-weight:700;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.title+'</div>'
          + '<div style="font-size:0.77rem;color:var(--accent);font-weight:700;margin-top:2px">$'+(p.price||0).toLocaleString('en-US')+'</div>'
          + '</div></div>';
      }).join('');
    }
  }, 300);
});
</script>

<script>
if ('serviceWorker' in navigator)
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
</script>
</body>
</html>
