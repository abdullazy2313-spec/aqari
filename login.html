<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e67e22">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="عقاري">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول - عقاري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-bottom:0">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo"><i class="fas fa-building"></i></div>
        <div class="splash-text">عقـ<span>ـاري</span></div>
        <div style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-top:8px">منصة العقارات الأولى في سوريا</div>
    </div>

    <div class="container login-wrapper">
        <div class="login-icon"><i class="fas fa-building"></i></div>
        <h2 style="margin-bottom:6px;font-size:1.7rem;font-weight:900;">مرحباً بك في عقاري</h2>
        <p style="color:var(--gray);margin-bottom:32px;font-size:0.88rem;">ابحث عن عقار أحلامك بكل سهولة</p>

        <div style="width:100%;max-width:340px">
            <!-- Tabs -->
            <div style="display:flex;gap:0;background:var(--gray-light);border-radius:12px;padding:4px;margin-bottom:24px">
                <button onclick="signInGoogle()" id="gBtn"
      style="width:100%;padding:12px;border:1.5px solid #dadce0;border-radius:12px;background:white;cursor:pointer;font-family:var(--font);font-size:0.88rem;font-weight:700;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="">
      <span>المتابعة عبر Google</span>
    </button>
                    <button onclick="socialLogin('Apple')"
                            style="flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;font-family:var(--font);font-size:0.85rem;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s">
                        <i class="fab fa-apple" style="font-size:1rem"></i>
                        Apple
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.style.background = 'var(--card)';
                loginTab.style.color = 'var(--text)';
                loginTab.style.boxShadow = 'var(--shadow-sm)';
                registerTab.style.background = 'transparent';
                registerTab.style.color = 'var(--gray)';
                registerTab.style.boxShadow = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                registerTab.style.background = 'var(--card)';
                registerTab.style.color = 'var(--text)';
                registerTab.style.boxShadow = 'var(--shadow-sm)';
                loginTab.style.background = 'transparent';
                loginTab.style.color = 'var(--gray)';
                loginTab.style.boxShadow = 'none';
            }
        }

        function handleLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!email || !pass) {
                showToast('⚠️ يرجى إدخال البريد وكلمة المرور');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px"></i> جاري الدخول...';

            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                window.location.href = 'index.html';
            }, 900);
        }

        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if (!name || !phone || !email || !pass) {
                showToast('⚠️ يرجى ملء جميع الحقول');
                return;
            }

            showToast('⏳ جاري إنشاء الحساب...');
            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', name);
                window.location.href = 'index.html';
            }, 1200);
        }

        function socialLogin(provider) {
            showToast(`⏳ جاري الدخول عبر ${provider}...`);
            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', `user@${provider.toLowerCase()}.com`);
                window.location.href = 'index.html';
            }, 1200);
        }

        function togglePass() {
            const input = document.getElementById('passInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js')
      .then(function(reg){console.log('[عقاري] SW مُفعّل');})
      .catch(function(e){console.warn('[عقاري] SW خطأ:',e);});
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
(function(){
  var cfg={apiKey:"AIzaSyCvVYtCsC7UR52bGLYvHebQqOumtat7poU",
    authDomain:"aqari-app-7c43f.firebaseapp.com",
    projectId:"aqari-app-7c43f"};
  try{if(!firebase.apps.length)firebase.initializeApp(cfg);}catch(e){}
  
  window.signInGoogle=async function(){
    var btn=document.getElementById('gBtn');
    btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> جاري...';
    btn.disabled=true;
    try{
      var auth=firebase.auth();
      var p=new firebase.auth.GoogleAuthProvider();
      p.setCustomParameters({prompt:'select_account'});
      var r=await auth.signInWithPopup(p);
      var u=r.user;
      localStorage.setItem('isLoggedIn','true');
      localStorage.setItem('userEmail',u.email||'');
      localStorage.setItem('userName',u.displayName||'مستخدم Google');
      if(u.photoURL)localStorage.setItem('userPhoto',u.photoURL);
      showToast('✅ مرحباً '+u.displayName);
      setTimeout(function(){location.href='index.html';},600);
    }catch(e){
      btn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20"> <span>المتابعة عبر Google</span>';
      btn.disabled=false;
      var msgs={
        'auth/popup-blocked':'⚠️ السماح بالنوافذ المنبثقة في المتصفح',
        'auth/popup-closed-by-user':'تم إغلاق النافذة',
        'auth/unauthorized-domain':'⚠️ أضف الدومين في Firebase Console',
        'auth/operation-not-allowed':'⚠️ فعّل Google في Firebase Authentication'
      };
      showToast(msgs[e.code]||'❌ تعذر تسجيل الدخول: '+e.code);
    }
  };
})();
</script>
</body>
</html>
