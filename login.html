<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e67e22">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="عقاري">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الدخول - عقاري</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
<style>
.google-btn{width:100%;padding:13px;border:1.5px solid #dadce0;border-radius:12px;background:white;cursor:pointer;font-family:var(--font);font-size:0.88rem;font-weight:700;color:#3c4043;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.google-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);border-color:#c6c6c6;}
.google-btn img{width:20px;height:20px;}
.google-btn:disabled{opacity:0.6;cursor:not-allowed;}
[data-theme='dark'] .google-btn{background:#2d3748;color:#e2e8f0;border-color:#4a5568;}
</style>
</head>
<body style="padding-bottom:0">
<div id="splash-screen">
    <div class="splash-logo"><i class="fas fa-building"></i></div>
    <div class="splash-text">عقـ<span>ـاري</span></div>
    <div style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-top:8px">منصة العقارات الأولى في سوريا</div>
</div>

<div class="container login-wrapper">
    <div class="login-icon"><i class="fas fa-building"></i></div>
    <h2 style="margin-bottom:6px;font-size:1.7rem;font-weight:900;">مرحباً بك في عقاري</h2>
    <p style="color:var(--gray);margin-bottom:32px;font-size:0.88rem;">ابحث عن عقار أحلامك بكل سهولة</p>

    <div style="width:100%;max-width:340px">
        <div style="display:flex;gap:0;background:var(--gray-light);border-radius:12px;padding:4px;margin-bottom:24px">
            <button id="loginTab" onclick="switchTab('login')" style="flex:1;padding:9px;border:none;border-radius:9px;background:var(--card);font-family:var(--font);font-size:0.88rem;font-weight:700;cursor:pointer;color:var(--text);box-shadow:var(--shadow-sm);transition:all 0.2s">دخول</button>
            <button id="registerTab" onclick="switchTab('register')" style="flex:1;padding:9px;border:none;border-radius:9px;background:transparent;font-family:var(--font);font-size:0.88rem;font-weight:600;cursor:pointer;color:var(--gray);transition:all 0.2s">تسجيل جديد</button>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope" style="color:var(--accent);margin-left:6px"></i>البريد الإلكتروني</label>
                <input type="email" id="emailInput" class="form-input" placeholder="example@mail.com" value="user@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock" style="color:var(--accent);margin-left:6px"></i>كلمة المرور</label>
                <div style="position:relative">
                    <input type="password" id="passInput" class="form-input" placeholder="••••••••" value="123456" autocomplete="current-password">
                    <button onclick="togglePass()" type="button" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;padding:6px;"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <div style="text-align:left;margin-bottom:20px">
                <a href="#" style="font-size:0.8rem;color:var(--accent);text-decoration:none;font-weight:600">نسيت كلمة المرور؟</a>
            </div>
            <button class="btn-primary btn-accent" onclick="handleLogin()" id="loginBtn"><i class="fas fa-sign-in-alt" style="margin-left:8px"></i> دخول</button>
        </div>

        <div id="registerForm" style="display:none">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user" style="color:var(--accent);margin-left:6px"></i>الاسم الكامل</label>
                <input type="text" class="form-input" id="regName" placeholder="محمد العبدالله">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-phone" style="color:var(--accent);margin-left:6px"></i>رقم الجوال</label>
                <input type="tel" class="form-input" id="regPhone" placeholder="05XXXXXXXX">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-envelope" style="color:var(--accent);margin-left:6px"></i>البريد الإلكتروني</label>
                <input type="email" class="form-input" id="regEmail" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock" style="color:var(--accent);margin-left:6px"></i>كلمة المرور</label>
                <input type="password" class="form-input" id="regPass" placeholder="6 أحرف على الأقل">
            </div>
            <button class="btn-primary btn-accent" onclick="handleRegister()" id="registerBtn"><i class="fas fa-user-plus" style="margin-left:8px"></i> إنشاء حساب</button>
        </div>

        <p style="margin-top:16px;font-size:0.78rem;color:var(--gray);text-align:center;"><i class="fas fa-info-circle"></i> أي بيانات تعمل للتجربة</p>

        <div style="margin-top:20px;text-align:center">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                <div style="flex:1;height:1px;background:var(--border)"></div>
                <span style="font-size:0.78rem;color:var(--gray)">أو سجّل بـ</span>
                <div style="flex:1;height:1px;background:var(--border)"></div>
            </div>
            <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                <span>المتابعة عبر Google</span>
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const FB_CFG = {
  apiKey:"AIzaSyCvVYtCsC7UR52bGLYvHebQqOumtat7poU",
  authDomain:"aqari-app-7c43f.firebaseapp.com",
  projectId:"aqari-app-7c43f",
  storageBucket:"aqari-app-7c43f.firebasestorage.app",
  messagingSenderId:"61607617094",
  appId:"1:61607617094:web:6939a1e6ef47c7885b2047"
};
let fbAuth = null;
try {
  if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
  fbAuth = firebase.auth();
  fbAuth.onAuthStateChanged(u => {
    if (u && !sessionStorage.getItem('_checking')) {
      sessionStorage.setItem('_checking','1');
      finishGoogleLogin(u);
    }
  });
} catch(e) { console.warn('Firebase Auth init:', e); }

function finishGoogleLogin(user) {
  sessionStorage.removeItem('_checking');
  localStorage.setItem('isLoggedIn','true');
  localStorage.setItem('userEmail', user.email||'');
  localStorage.setItem('userName', user.displayName||'مستخدم Google');
  if (user.photoURL) localStorage.setItem('userPhoto', user.photoURL);
  location.href = 'index.html';
}

async function signInWithGoogle() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري الدخول...</span>';
  try {
    if (!fbAuth) throw new Error('Firebase Auth غير متاح');
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    provider.setCustomParameters({prompt:'select_account'});
    const result = await fbAuth.signInWithPopup(provider);
    showToast('✅ مرحباً ' + (result.user.displayName||'بك'));
    finishGoogleLogin(result.user);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:20px;height:20px"><span>المتابعة عبر Google</span>';
    let msg = '❌ تعذر تسجيل الدخول بـ Google';
    if (e.code === 'auth/popup-blocked')          msg = '⚠️ افتح إعدادات المتصفح وسمح بالنوافذ المنبثقة';
    else if (e.code === 'auth/popup-closed-by-user') msg = 'تم إغلاق نافذة Google';
    else if (e.code === 'auth/unauthorized-domain') msg = '⚠️ أضف الدومين في Firebase Console → Authentication → Settings';
    else if (e.code === 'auth/operation-not-allowed') msg = '⚠️ فعّل Google في Firebase → Authentication → Sign-in method';
    showToast(msg, 4000);
  }
}

function handleLogin() {
  const em = document.getElementById('emailInput').value.trim();
  const ps = document.getElementById('passInput').value.trim();
  const btn = document.getElementById('loginBtn');
  if (!em||!ps) { showToast('⚠️ يرجى إدخال البريد وكلمة المرور'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px"></i> جاري الدخول...';
  setTimeout(() => {
    localStorage.setItem('isLoggedIn','true');
    localStorage.setItem('userEmail', em);
    if (!localStorage.getItem('userName')) localStorage.setItem('userName','مستخدم عقاري');
    location.href = 'index.html';
  }, 900);
}

function handleRegister() {
  const nm = document.getElementById('regName').value.trim();
  const ph = document.getElementById('regPhone').value.trim();
  const em = document.getElementById('regEmail').value.trim();
  const ps = document.getElementById('regPass').value.trim();
  if (!nm||!ph||!em||!ps) { showToast('⚠️ يرجى ملء جميع الحقول'); return; }
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px"></i> جاري التسجيل...';
  setTimeout(() => {
    localStorage.setItem('isLoggedIn','true');
    localStorage.setItem('userEmail',em);
    localStorage.setItem('userName',nm);
    localStorage.setItem('userPhone',ph);
    location.href = 'index.html';
  }, 1200);
}

function togglePass() {
  const i = document.getElementById('passInput');
  const ic = document.getElementById('eyeIcon');
  i.type = i.type==='password'?'text':'password';
  ic.className = i.type==='password'?'fas fa-eye':'fas fa-eye-slash';
}

function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  ['loginTab','registerTab'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    const on = id===tab+'Tab';
    el.style.background = on?'var(--card)':'transparent';
    el.style.fontWeight  = on?'700':'600';
    el.style.color       = on?'var(--text)':'var(--gray)';
    el.style.boxShadow   = on?'var(--shadow-sm)':'none';
  });
}
document.addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js')
      .then(reg=>console.log('[عقاري] SW مُفعّل'))
      .catch(e=>console.warn('[عقاري] SW خطأ:',e));
  });
}
</script>
</body>
</html>
