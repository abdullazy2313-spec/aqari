<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e67e22">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="횠쨔횢혗횠짠횠짹횢혡">
  <link rel="apple-touch-icon" href="icons/icon-192.png"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>횠짠횢혙횠짹횠쨀횠짠횠짝횢혙 - 횠쨔횢혗횠짠횠짹횢혡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;position:relative;}
.chat-item:hover,.chat-item:active{background:var(--gray-light);}
.chat-avatar-wrap{position:relative;flex-shrink:0;}
.chat-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:white;background:linear-gradient(135deg,var(--primary),var(--accent));}
.chat-online-dot{position:absolute;bottom:2px;left:2px;width:12px;height:12px;background:#27ae60;border-radius:50%;border:2px solid var(--card);}
.chat-info{flex:1;overflow:hidden;}
.chat-name{font-weight:800;font-size:0.9rem;color:var(--text);}
.chat-preview{font-size:0.78rem;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.chat-time{font-size:0.68rem;color:var(--gray);white-space:nowrap;}
.chat-unread{min-width:20px;height:20px;background:var(--accent);border-radius:99px;font-size:0.65rem;color:white;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;margin-top:4px;}
.empty-msgs{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-msgs i{font-size:3.5rem;margin-bottom:16px;display:block;opacity:0.3;}
</style>
</head>
<body>
<header>
  <div class="logo"><i class="fas fa-comment-dots" style="color:var(--accent);margin-left:8px"></i>횠짠횢혙횠짹횠쨀횠짠횠짝횢혙</div>
  <span id="msgBadge" style="background:var(--danger);color:white;padding:2px 8px;border-radius:99px;font-size:0.7rem;font-weight:700;display:none"></span>
</header>
<div class="container" id="messagesContainer" style="padding:0"></div>
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="index"><i class="fas fa-home"></i><span>횠짠횢혙횠짹횠짝횢혡횠쨀횢혡횠짤</span></a>
  <a href="favorites.html" class="nav-item" data-page="favorites"><i class="fas fa-heart"></i><span>횠짠횢혙횢혚횢혖횠쨋횢혙횠짤</span></a>
  <a href="messages.html" class="nav-item active" data-page="messages"><i class="fas fa-comment-dots"></i><span>횠짠횢혙횠짹횠쨀횠짠횠짝횢혙</span></a>
  <a href="profile.html" class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>횠짯횠쨀횠짠횠짢횢혡</span></a>
</nav>
<div id="toast"></div>
<script src="js/app.js"></script>
<script src="js/firebase.js"></script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js')
      .then(function(reg){console.log('[횠쨔횢혗횠짠횠짹횢혡] SW 횢혚횢혧횢혖횠쨔횢혩횢혙');})
      .catch(function(e){console.warn('[횠쨔횢혗횠짠횠짹횢혡] SW 횠짰횠쨌횠짙:',e);});
  });
}
</script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</body>
</html>
